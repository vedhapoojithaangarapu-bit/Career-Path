<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Details Form - B.Tech Portal</title>
    <!-- Google Font: Inter -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

    <style>
        /* ============================================================
           CSS Custom Properties (Universal Theme Tokens)
           ============================================================ */
        :root {
            /* Dark Theme (Default) */
            --clr-bg-start: #0d0f1a;
            --clr-bg-end: #121629;
            --clr-primary: #6c63ff;
            --clr-primary-h: #8b85ff;
            --clr-accent: #00d4aa;
            --clr-danger: #ff5c7a;

            --card-bg: rgba(255, 255, 255, 0.05);
            --card-border: rgba(255, 255, 255, 0.12);
            --card-shadow: 0 25px 60px rgba(0, 0, 0, 0.55);

            --clr-text: #e2e8f0;
            --clr-text-muted: #94a3b8;
            --clr-label: #cbd5e1;

            --input-bg: rgba(255, 255, 255, 0.07);
            --input-border: rgba(255, 255, 255, 0.15);
            --input-focus: rgba(108, 99, 255, 0.6);

            --brand-gradient-start: #ffffff;
            --brand-gradient-end: var(--clr-primary-h);
            --radius-card: 24px;
            --radius-input: 12px;
            --font-main: 'Inter', system-ui, sans-serif;
            --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
        }

        [data-theme="light"] {
            /* Light Theme Override */
            --clr-bg-start: #f0f4f8;
            --clr-bg-end: #d9e2ec;
            --clr-primary: #5a52e6;
            --clr-primary-h: #4942cf;

            --card-bg: rgba(255, 255, 255, 0.85);
            --card-border: rgba(255, 255, 255, 0.6);
            --card-shadow: 0 25px 40px rgba(0, 0, 0, 0.08);

            --clr-text: #102a43;
            --clr-text-muted: #486581;
            --clr-label: #334e68;

            --input-bg: rgba(255, 255, 255, 0.9);
            --input-border: rgba(0, 0, 0, 0.15);
            --input-focus: rgba(90, 82, 230, 0.4);

            --brand-gradient-start: #102a43;
            --brand-gradient-end: var(--clr-primary);
        }

        /* ── Base Styles ──────────────────────────────────────── */
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: var(--font-main);
            background: linear-gradient(135deg, var(--clr-bg-start), var(--clr-bg-end));
            min-height: 100vh;
            color: var(--clr-text);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 2rem 1rem;
            position: relative;
            overflow-x: hidden;
        }

        /* Theme Toggle Button */
        .theme-toggle {
            position: fixed;
            top: 1.5rem;
            right: 1.5rem;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: 50%;
            width: 45px;
            height: 45px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--clr-text);
            cursor: pointer;
            z-index: 100;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            transition: background var(--transition), transform var(--transition);
        }

        .theme-toggle:hover {
            transform: scale(1.05);
            background: var(--input-bg);
        }

        .theme-toggle svg {
            width: 22px;
            height: 22px;
            position: absolute;
            transition: opacity var(--transition), transform var(--transition);
        }

        .sun-icon {
            opacity: 0;
            transform: rotate(-45deg);
        }

        .moon-icon {
            opacity: 1;
            transform: rotate(0);
        }

        [data-theme="light"] .sun-icon {
            opacity: 1;
            transform: rotate(0);
        }

        [data-theme="light"] .moon-icon {
            opacity: 0;
            transform: rotate(45deg);
        }

        /* Animated Background Blobs */
        .bg-blob {
            position: fixed;
            border-radius: 50%;
            filter: blur(100px);
            opacity: 0.15;
            pointer-events: none;
            z-index: -1;
        }

        .blob-1 {
            width: 400px;
            height: 400px;
            background: var(--clr-primary);
            top: -10%;
            left: -5%;
        }

        .blob-2 {
            width: 350px;
            height: 350px;
            background: var(--clr-accent);
            bottom: -10%;
            right: -5%;
        }

        /* ── Form Card ────────────────────────────────────────── */
        .details-container {
            width: 100%;
            max-width: 800px;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            border-radius: var(--radius-card);
            box-shadow: var(--card-shadow);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            padding: 3rem;
            animation: formIn 0.6s cubic-bezier(0.22, 1, 0.36, 1) both;
        }

        @keyframes formIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .header {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .header h1 {
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--brand-gradient-start) 30%, var(--brand-gradient-end));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }

        .header p {
            color: var(--clr-text-muted);
            font-size: 0.95rem;
        }

        /* Form Grid Layout */
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
        }

        .form-group.full-width {
            grid-column: 1 / -1;
        }

        .form-label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--clr-label);
            margin-bottom: 0.5rem;
        }

        .form-input,
        .form-select,
        .form-textarea {
            width: 100%;
            background: var(--input-bg);
            border: 1px solid var(--input-border);
            border-radius: var(--radius-input);
            color: var(--clr-text);
            font-family: var(--font-main);
            padding: 0.8rem 1rem;
            font-size: 0.95rem;
            outline: none;
            transition: all var(--transition);
        }

        /* Select dropdown styles Fix for dark mode OS default */
        .form-select option {
            background: var(--clr-bg-end);
            color: var(--clr-text);
        }

        [data-theme="light"] .form-select option {
            background: white;
            color: black;
        }

        .form-textarea {
            resize: vertical;
            min-height: 100px;
        }

        .form-input:focus,
        .form-select:focus,
        .form-textarea:focus {
            border-color: var(--clr-primary);
            box-shadow: 0 0 0 3px var(--input-focus);
            background: rgba(255, 255, 255, 0.1);
        }

        /* File Upload Styling */
        .file-upload-wrapper {
            position: relative;
            background: var(--input-bg);
            border: 2px dashed var(--input-border);
            border-radius: var(--radius-input);
            padding: 1.5rem;
            text-align: center;
            cursor: pointer;
            transition: border-color var(--transition);
        }

        .file-upload-wrapper:hover {
            border-color: var(--clr-primary-h);
        }

        .file-input {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            opacity: 0;
            cursor: pointer;
        }

        .file-label-text {
            color: var(--clr-text-muted);
            font-size: 0.9rem;
            pointer-events: none;
        }

        .btn-submit {
            grid-column: 1 / -1;
            padding: 1rem;
            border: none;
            border-radius: var(--radius-input);
            background: linear-gradient(135deg, var(--clr-primary), #9b5de5);
            color: white;
            font-size: 1.05rem;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 4px 15px rgba(108, 99, 255, 0.4);
            margin-top: 1rem;
            transition: transform var(--transition), box-shadow var(--transition);
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(108, 99, 255, 0.5);
        }

        .btn-submit:active {
            transform: translateY(0);
        }

        @media (max-width: 768px) {
            .form-grid {
                grid-template-columns: 1fr;
                gap: 1rem;
            }

            .details-container {
                padding: 2rem;
            }
        }
    </style>
</head>

<body>

    <!-- Animated background blobs -->
    <div class="bg-blob blob-1"></div>
    <div class="bg-blob blob-2"></div>

    <!-- Theme Toggle -->
    <button id="themeToggle" class="theme-toggle" aria-label="Toggle light/dark mode">
        <svg class="sun-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
            <path
                d="M12 7a5 5 0 1 0 0 10 5 5 0 0 0 0-10zm0 8a3 3 0 1 1 0-6 3 3 0 0 1 0 6zm-1-13h2v3h-2zm0 18h2v3h-2zm-8.485-3.05 2.121-2.122 1.414 1.415-2.122 2.121zm14.142-14.142 2.121-2.122 1.414 1.415-2.122 2.121zM2 11h3v2H2zm18 0h3v2h-3zM5.636 5.636l1.414 1.414-2.121 2.121-1.414-1.414zM16.243 16.243l1.414 1.414-2.121 2.121-1.414-1.414z" />
        </svg>
        <svg class="moon-icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor">
            <path
                d="M12 3a9 9 0 1 0 9 9c0-.46-.04-.92-.1-1.36a5.389 5.389 0 0 1-4.4 2.26 5.403 5.403 0 0 1-3.14-9.8c-.44-.06-.9-.1-1.36-.1z" />
        </svg>
    </button>

    <main class="details-container">
        <div class="header">
            <h1>Student Profile</h1>
        </div>

        <form id="detailsForm" onsubmit="goToDashboard(event)" class="form-grid">

            <!-- Personal Details -->

            <div class="form-group full-width">
                <label for="fullName" class="form-label">Full Name</label>
                <input type="text" id="fullName" class="form-input" placeholder="Enter your full name" required>
            </div>

            <div class="form-group">
                <label for="dob" class="form-label">Date of Birth</label>
                <input type="date" id="dob" class="form-input" required>
            </div>

            <div class="form-group">
                <label for="gender" class="form-label">Gender</label>
                <select id="gender" class="form-select" required>
                    <option value="" disabled selected>Select Gender</option>
                    <option value="male">Male</option>
                    <option value="female">Female</option>
                    <option value="other">Other</option>
                    <option value="prefer_not_to_say">Prefer not to say</option>
                </select>
            </div>

            <div class="form-group">
                <label for="phone" class="form-label">Phone Number</label>
                <input type="tel" id="phone" class="form-input" placeholder="+1 (555) 000-0000" required>
            </div>

            <div class="form-group full-width">
                <label for="email" class="form-label">Email Address</label>
                <input type="email" id="email" class="form-input" placeholder="student@gmail.com" required>
            </div>

            <div class="form-group full-width">
                <label for="password" class="form-label">Password</label>
                <input type="password" id="password" class="form-input" placeholder="Enter your password" required>
            </div>

            <div class="form-group full-width">
                <label for="address" class="form-label">Residential Address</label>
                <textarea id="address" class="form-textarea" placeholder="Enter your full address" required></textarea>
            </div>

            <!-- Academic Details -->
            <div class="form-group">
                <label for="college" class="form-label">College / University</label>
                <input type="text" id="college" class="form-input" placeholder="E.g. National Institute of Technology"
                    required>
            </div>

            <div class="form-group">
                <label for="branch" class="form-label">Branch</label>
                <select id="branch" class="form-select" required>
                    <option value="" disabled selected>Select Branch</option>
                    <option value="CS">Computer Science (CS)</option>
                    <option value="IT">Information Technology (IT)</option>
                    <option value="ECE">Electronics & Comm. (ECE)</option>
                    <option value="EE">Electrical Engineering (EE)</option>
                    <option value="ME">Mechanical Engineering (ME)</option>
                    <option value="CE">Civil Engineering (CE)</option>
                </select>
            </div>

            <div class="form-group">
                <label for="currentYear" class="form-label">Current Academic Year</label>
                <select id="currentYear" class="form-select" required>
                    <option value="" disabled selected>Select Year</option>
                    <option value="1">1st Year</option>
                    <option value="2">2nd Year</option>
                    <option value="3">3rd Year</option>
                    <option value="4">4th Year</option>
                </select>
            </div>

            <div class="form-group">
                <label for="gradYear" class="form-label">Graduating Year</label>
                <input type="number" id="gradYear" class="form-input" min="2024" max="2030" placeholder="YYYY" required>
            </div>

            <div class="form-group">
                <label for="cgpa" class="form-label">Current CGPA (out of 10.0)</label>
                <input type="number" id="cgpa" class="form-input" min="0" max="10" step="0.01" placeholder="9.50"
                    required>
            </div>

            <!-- Document Upload -->
            <div class="form-group full-width">
                <label class="form-label">Student ID Upload</label>
                <div class="file-upload-wrapper">
                    <input type="file" id="idUpload" class="file-input" accept="image/png, image/jpeg, application/pdf"
                        required>
                    <span class="file-label-text" id="fileText">📁 Drag and drop or click to upload ID (PDF, JPG,
                        PNG)</span>
                </div>
            </div>

            <button type="submit" class="btn-submit">Submit Profile Details</button>
        </form>
    </main>

    <script>
        /* ── Theme Toggle Logic ──────────────────────────────────── */
        const rootElement = document.documentElement;
        const themeToggle = document.getElementById('themeToggle');

        function setTheme(theme) {
            rootElement.setAttribute('data-theme', theme);
            // Universal theme syncing across pages
            localStorage.setItem('btech_theme', theme);
        }

        // Initialize Universal Theme
        const savedTheme = localStorage.getItem('btech_theme');
        if (savedTheme) {
            setTheme(savedTheme);
        } else {
            const prefersLight = window.matchMedia('(prefers-color-scheme: light)').matches;
            setTheme(prefersLight ? 'light' : 'dark');
        }

        themeToggle.addEventListener('click', () => {
            const currentTheme = rootElement.getAttribute('data-theme') || 'dark';
            setTheme(currentTheme === 'dark' ? 'light' : 'dark');
        });

        /* ── Form Logic ──────────────────────────────────────────── */
        const fileInput = document.getElementById('idUpload');
        const fileText = document.getElementById('fileText');

        // Show uploaded file name
        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                fileText.textContent = `✅ Selected file: ${e.target.files[0].name}`;
                fileText.style.color = 'var(--clr-primary)';
            } else {
                fileText.textContent = "📁 Drag and drop or click to upload ID (PDF, JPG, PNG)";
                fileText.style.color = 'var(--clr-text-muted)';
            }
        });




        function goToDashboard(event) {
            event.preventDefault(); // stop refresh

            // optional: simple validation
            const inputs = document.querySelectorAll("#detailsForm input");

            for (let input of inputs) {
                if (input.value === "") {
                    alert("Please fill all details");
                    return;
                }
            }

            // ✅ redirect
            window.location.href = "dashboard.html";
        }

    </script>
</body>

</html>
