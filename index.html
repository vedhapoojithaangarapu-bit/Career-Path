<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CareerPath - Learning to Earning</title>
    <!-- Google Fonts: Inter -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        /* ============================================================ 
           1. CSS Custom Properties (Theming)
           ============================================================ */
        :root {
            /* Light Mode Variables */
            --bg-gradient: linear-gradient(135deg, #e0c3fc 0%, #8ec5fc 100%);
            --header-bg: rgba(255, 255, 255, 0.7);
            --card-bg: rgba(255, 255, 255, 0.8);
            --text-main: #1a1c2e;
            --text-muted: #64748b;
            --accent: #6c63ff;
            --accent-hover: #5b54d6;
            --input-bg: rgba(255, 255, 255, 0.9);
            --glass-border: rgba(255, 255, 255, 0.5);
            --shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        [data-theme="dark"] {
            /* Dark Mode Variables */
            --bg-gradient: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            --header-bg: rgba(15, 23, 42, 0.7);
            --card-bg: rgba(30, 41, 59, 0.7);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #8b5cf6;
            --accent-hover: #7c3aed;
            --input-bg: rgba(15, 23, 42, 0.8);
            --glass-border: rgba(255, 255, 255, 0.1);
            --shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
        }

        /* ============================================================ 
           2. Global Styles & Animations
           ============================================================ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-gradient);
            color: var(--text-main);
            min-height: 100vh;
            overflow-x: hidden;
            transition: var(--transition);
        }

        @keyframes fadeInSlideUp {
            from {
                opacity: 0;
                transform: translateY(20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .section {
            display: none;
            padding: 100px 20px 40px;
            min-height: 100vh;
            animation: fadeInSlideUp 0.6s ease-out forwards;
        }

        .section.active {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        /* ============================================================ 
           3. Header & Navigation
           ============================================================ */
        header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 70px;
            background: var(--header-bg);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--glass-border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 5%;
            z-index: 1000;
            transition: var(--transition);
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--text-main);
            text-decoration: none;
            cursor: pointer;
        }

        .logo span {
            color: var(--accent);
        }

        .nav-actions {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .btn-login-nav {
            background: transparent;
            color: var(--text-main);
            border: 1.5px solid var(--accent);
            padding: 8px 18px;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
        }

        .btn-login-nav:hover {
            background: var(--accent);
            color: white;
            box-shadow: 0 4px 15px rgba(108, 99, 255, 0.3);
        }

        .theme-toggle {
            background: var(--card-bg);
            border: 1px solid var(--glass-border);
            color: var(--text-main);
            width: 40px;
            height: 40px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 1.2rem;
            transition: var(--transition);
        }

        .theme-toggle:hover {
            transform: scale(1.1) rotate(15deg);
        }

        /* ============================================================ 
           4. Home Hero Section
           ============================================================ */
        .hero {
            text-align: center;
            max-width: 800px;
        }

        .hero h1 {
            font-size: 4rem;
            font-weight: 800;
            margin-bottom: 20px;
            background: linear-gradient(45deg, var(--accent), #00f2fe);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .hero p {
            font-size: 1.2rem;
            color: var(--text-muted);
            margin-bottom: 40px;
            line-height: 1.6;
        }

        .btn-main {
            padding: 15px 40px;
            background: var(--accent);
            color: white;
            border: none;
            border-radius: 15px;
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: var(--transition);
            box-shadow: 0 10px 20px rgba(108, 99, 255, 0.2);
        }

        .btn-main:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 30px rgba(108, 99, 255, 0.4);
            background: var(--accent-hover);
        }



        /* ============================================================ 
           6. Utilities & Responsive
           ============================================================ */
        @media (max-width: 600px) {
            .hero h1 {
                font-size: 2.5rem;
            }

            header {
                padding: 0 20px;
            }

            .btn-login-nav {
                display: none;
            }

            /* Hide in mobile nav to save space */
            .logo {
                font-size: 1.2rem;
            }
        }
    </style>
</head>

<body>
    <header>
        <a class="logo">Career<span>Path</span></a>
        <div class="nav-actions">
            <button class="btn-login-nav" onclick="window.location.href='login.html'">Login</button>
            <button class="theme-toggle" id="themeToggleBtn" onclick="toggleTheme()">🌙</button>
        </div>
    </header>

    <section id="home" class="section active">
        <div class="hero">
            <h1>CareerPath</h1>
            <p>"Your journey from learning to earning starts here"</p>
            <button class="btn-main" onclick="window.location.href='details.html'">Get Started</button>
        </div>
    </section>





    <script>
        /* ============================================================ 
           1. Navigation Logic
           ============================================================ */
        function showSection(sectionId) {
            // Hide all sections
            const sections = document.querySelectorAll('.section');
            sections.forEach(sec => sec.classList.remove('active'));

            // Show selected section
            const target = document.getElementById(sectionId);
            if (target) {
                target.classList.add('active');
                window.scrollTo(0, 0);
            }
        }



        /* ============================================================ 
           3. Theme Toggle Logic
           ============================================================ */
        function toggleTheme() {
            const body = document.body;
            const currentTheme = body.getAttribute('data-theme');
            const newTheme = currentTheme === 'light' ? 'dark' : 'light';

            applyTheme(newTheme);
            localStorage.setItem('careerpath_theme', newTheme);
        }

        function applyTheme(theme) {
            document.body.setAttribute('data-theme', theme);
            const btn = document.getElementById('themeToggleBtn');
            btn.innerHTML = theme === 'light' ? '🌙' : '☀️';
        }

        // Initialize Theme on Load
        window.addEventListener('load', () => {
            const savedTheme = localStorage.getItem('careerpath_theme') || 'light';
            applyTheme(savedTheme);
        });
    </script>
</body>

</html>
